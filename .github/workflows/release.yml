name: Release
run-name: Release ${{ github.event.release.tag_name || inputs.tag }}

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name (e.g. v0.2.2-beta.1)'
        required: true
        type: string

jobs:
  get-release-info:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.info.outputs.tag }}
      release_id: ${{ steps.info.outputs.release_id }}
      is_prerelease: ${{ steps.info.outputs.is_prerelease }}
    steps:
      - name: Get release info
        id: info
        run: |
          TAG="${{ github.event.release.tag_name || inputs.tag }}"
          RELEASE_INFO=$(gh api repos/${{ github.repository }}/releases --jq ".[] | select(.tag_name == \"$TAG\")")
          RELEASE_ID=$(echo "$RELEASE_INFO" | jq -r '.id')
          IS_PRERELEASE=$(echo "$RELEASE_INFO" | jq -r '.prerelease')
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "release_id=$RELEASE_ID" >> $GITHUB_OUTPUT
          echo "is_prerelease=$IS_PRERELEASE" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-tauri:
    needs: [get-release-info]
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
          - platform: windows-latest
            args: '--bundles nsis'

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.get-release-info.outputs.tag }}

      - name: setup node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          prefix-key: "v${{ vars.CACHE_VERSION }}"
          cache-on-failure: false

      - name: Build and upload to release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.get-release-info.outputs.release_id }}
          tagName: ${{ needs.get-release-info.outputs.tag }}
          args: ${{ matrix.args }}
          projectPath: src-tauri
          updaterJsonPreferNsis: true

  publish-release:
    needs: [publish-tauri, get-release-info]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.get-release-info.outputs.tag }}"
          IS_PRERELEASE="${{ needs.get-release-info.outputs.is_prerelease }}"

          if [ "$IS_PRERELEASE" = "true" ]; then
            gh release edit "$TAG" --repo ${{ github.repository }} --draft=false
          else
            gh release edit "$TAG" --repo ${{ github.repository }} --draft=false --latest
          fi
