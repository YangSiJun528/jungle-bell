<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="styles.css" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jungle Bell</title>
</head>
<body>
  <div class="header">
    <img src="assets/logo.png" alt="Jungle Bell" class="logo" />
    <div>
      <h1>Jungle Bell <small id="app-version"></small></h1>
      <p>크래프톤 정글 출석 체크 리마인더</p>
    </div>
  </div>

  <table>
    <tr><th>학습 시작</th><td>04:00 ~ 10:00</td></tr>
    <tr><th>학습 종료</th><td>23:00 ~ 04:00</td></tr>
    <tr>
      <th>자동 시작</th>
      <td>
        <label class="toggle">
          <input type="checkbox" id="auto-start-toggle" />
          <span class="toggle-slider"></span>
        </label>
      </td>
    </tr>
    <tr>
      <th>자동 업데이트</th>
      <td>
        <label class="toggle">
          <input type="checkbox" id="auto-update-toggle" />
          <span class="toggle-slider"></span>
        </label>
      </td>
    </tr>
    <tr>
      <th></th>
      <td><button id="check-update-btn" class="link-btn">업데이트 확인</button></td>
    </tr>
    <tr><td colspan="2" style="height:8px"></td></tr>
    <tr>
      <th>알림</th>
      <td>
        <label class="toggle">
          <input type="checkbox" id="notification-toggle" />
          <span class="toggle-slider"></span>
        </label>
      </td>
    </tr>
    <tr>
      <th>시작 시간</th>
      <td>
        <select id="notification-start-select"></select>
      </td>
    </tr>
    <tr>
      <th>종료 시간</th>
      <td>
        <select id="notification-end-select"></select>
      </td>
    </tr>
    <tr>
      <th>알림 간격</th>
      <td>
        <select id="notification-interval-select">
          <option value="1">1분</option>
          <option value="3">3분</option>
          <option value="5">5분</option>
          <option value="10">10분</option>
          <option value="15">15분</option>
          <option value="30">30분</option>
        </select>
      </td>
    </tr>
  </table>

  <script>
    const { invoke } = window.__TAURI__.core;
    window.addEventListener('DOMContentLoaded', async () => {
      try {
        document.getElementById('app-version').textContent = 'v' + await invoke('get_app_version');

        const autoStartToggle = document.getElementById('auto-start-toggle');
        autoStartToggle.checked = await invoke('get_auto_start');
        autoStartToggle.addEventListener('change', async () => {
          try {
            await invoke('set_auto_start', { enabled: autoStartToggle.checked });
          } catch (e) {
            console.error(e);
            autoStartToggle.checked = !autoStartToggle.checked;
          }
        });

        const toggle = document.getElementById('auto-update-toggle');
        toggle.checked = await invoke('get_auto_update');
        toggle.addEventListener('change', () => {
          invoke('set_auto_update', { enabled: toggle.checked }).catch(console.error);
        });

        document.getElementById('check-update-btn').addEventListener('click', () => {
          invoke('check_and_notify_update').catch(console.error);
        });

        // --- 알림 설정 ---
        const notifToggle = document.getElementById('notification-toggle');
        notifToggle.checked = await invoke('get_notification_enabled');
        notifToggle.addEventListener('change', () => {
          invoke('set_notification_enabled', { enabled: notifToggle.checked }).catch(console.error);
        });

        // fromHour~toHour 범위의 시간 옵션 생성 (자정 넘김 지원)
        function populateHourSelect(selectEl, fromHour, toHour) {
          let h = fromHour;
          while (true) {
            const opt = document.createElement('option');
            opt.value = h;
            opt.textContent = String(h).padStart(2, '0') + ':00';
            selectEl.appendChild(opt);
            if (h === toHour) break;
            h = (h + 1) % 24;
          }
        }

        const notifStartSelect = document.getElementById('notification-start-select');
        populateHourSelect(notifStartSelect, 4, 10);
        const notifStart = await invoke('get_notification_start');
        notifStartSelect.value = notifStart.hour;
        notifStartSelect.addEventListener('change', () => {
          invoke('set_notification_start', { hour: parseInt(notifStartSelect.value), minute: 0 }).catch(console.error);
        });

        const notifEndSelect = document.getElementById('notification-end-select');
        populateHourSelect(notifEndSelect, 23, 4);
        const notifEnd = await invoke('get_notification_end');
        notifEndSelect.value = notifEnd.hour;
        notifEndSelect.addEventListener('change', () => {
          invoke('set_notification_end', { hour: parseInt(notifEndSelect.value), minute: 0 }).catch(console.error);
        });

        const notifIntervalSelect = document.getElementById('notification-interval-select');
        const currentInterval = await invoke('get_notification_interval');
        notifIntervalSelect.value = currentInterval;
        notifIntervalSelect.addEventListener('change', () => {
          invoke('set_notification_interval', { minutes: parseInt(notifIntervalSelect.value) }).catch(console.error);
        });
      } catch (e) {
        console.error('초기화 중 오류 발생:', e);
      }
    });
  </script>

  <footer>
    <a href="https://github.com/YangSiJun528/jungle-bell" target="_blank" rel="noopener noreferrer">GitHub</a>
    <span> · </span>
    <a href="https://github.com/YangSiJun528/jungle-bell/releases" target="_blank" rel="noopener noreferrer">릴리즈</a>
  </footer>
</body>
</html>
